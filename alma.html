<!DOCTYPE html>
<html lang="he">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>מזל טוב אלמה</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #fce8f0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 24px;
    }
    #animation { width: 100%; max-width: 640px; aspect-ratio: 5 / 3; }
    .greeting {
      font-size: 30px; font-weight: 700; color: #cf9b2e;
      margin-top: 4px; letter-spacing: 0.5px;
    }
    .back {
      position: fixed; top: 18px; left: 18px;
      font-family: inherit; font-size: 14px; text-decoration: none;
      color: #9a7b3a; background: rgba(255,255,255,0.7);
      padding: 8px 14px; border-radius: 999px;
    }
  </style>
</head>
<body>
  <a class="back" href="index.html">← Gallery</a>
  <div id="animation"></div>
  <div class="greeting">מזל טוב! 🎉</div>

  <script src="lottie.min.js"></script>
  <script>
    fetch("alma.json").then(r => r.json()).then(data => {
      lottie.loadAnimation({
        container: document.getElementById("animation"),
        renderer: "svg", loop: true, autoplay: true, animationData: data
      });
    });
  </script>
</body>
</html>
