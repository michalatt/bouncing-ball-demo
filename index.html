<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Animations</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #faf7f8; color: #2a2730;
      display: flex; flex-direction: column; align-items: center;
      padding: 56px 20px 80px;
    }
    h1 { font-size: 30px; margin: 0 0 6px; font-weight: 700; }
    .sub { color: #8a8593; margin: 0 0 44px; font-size: 16px; }
    .grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 320px));
      gap: 28px; width: 100%; max-width: 720px; justify-content: center;
    }
    .card {
      background: #fff; border-radius: 20px; overflow: hidden;
      box-shadow: 0 6px 30px rgba(60,40,70,0.08);
      text-decoration: none; color: inherit;
      transition: transform .18s ease, box-shadow .18s ease;
      display: flex; flex-direction: column;
    }
    .card:hover { transform: translateY(-4px); box-shadow: 0 12px 40px rgba(60,40,70,0.14); }
    .player { width: 100%; aspect-ratio: 5 / 3; }
    .label { padding: 16px 20px 20px; }
    .label .name { font-size: 18px; font-weight: 600; }
    .label .go { font-size: 14px; color: #b08a2e; margin-top: 4px; }
  </style>
</head>
<body>
  <h1>✨ Animations</h1>
  <p class="sub">A small gallery — tap any one to open it full screen.</p>

  <div class="grid">
    <a class="card" href="alma.html">
      <div class="player" id="p-alma"></div>
      <div class="label"><div class="name">מזל טוב אלמה</div><div class="go">Open →</div></div>
    </a>
    <a class="card" href="ball.html">
      <div class="player" id="p-ball"></div>
      <div class="label"><div class="name">Bouncing ball</div><div class="go">Open →</div></div>
    </a>
  </div>

  <script src="lottie.min.js"></script>
  <script>
    function play(containerId, file) {
      fetch(file).then(r => r.json()).then(data => {
        lottie.loadAnimation({
          container: document.getElementById(containerId),
          renderer: "svg", loop: true, autoplay: true, animationData: data
        });
      });
    }
    play("p-alma", "alma.json");
    play("p-ball", "ball.json");
  </script>
</body>
</html>
