<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bouncing ball</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #ffffff;
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
    }
    #animation { width: 100%; max-width: 560px; aspect-ratio: 1 / 1; }
    .back {
      position: fixed; top: 18px; left: 18px;
      font-family: inherit; font-size: 14px; text-decoration: none;
      color: #4a78c0; background: #f0f3f8;
      padding: 8px 14px; border-radius: 999px;
    }
  </style>
</head>
<body>
  <a class="back" href="index.html">← Gallery</a>
  <div id="animation"></div>

  <script src="lottie.min.js"></script>
  <script>
    fetch("ball.json").then(r => r.json()).then(data => {
      lottie.loadAnimation({
        container: document.getElementById("animation"),
        renderer: "svg", loop: true, autoplay: true, animationData: data
      });
    });
  </script>
</body>
</html>
